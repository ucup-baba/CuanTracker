<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#facc15" />
    <meta name="description" content="Aplikasi pencatatan keuangan pribadi & asrama bergaya neo-brutalism." />
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/pwa-192x192.png">
    <title>CuanTracker</title>
    <script>
        // Apply saved theme before paint to avoid a light-mode flash.
        // (theme-color/status-bar tint is set per role by App.jsx.)
        (function () {
            try {
                if (localStorage.getItem('cuan-theme') === 'dark') {
                    document.documentElement.classList.add('dark');
                }
                if (localStorage.getItem('cuan-ui-skin') === 'soft') {
                    document.documentElement.classList.add('ui-soft');
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
